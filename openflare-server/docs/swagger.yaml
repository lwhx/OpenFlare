              type: object
        "400":
          description: 原密码错误或新密码不符合要求
          schema:
            $ref: '#/definitions/response.Any'
        "401":
          description: 请先登录
          schema:
            $ref: '#/definitions/response.Any'
      summary: 修改用户密码
      tags:
      - user
  /api/v1/user/login:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码登录，登录成功后建立 Session。若管理员已关闭密码登录功能则返回错误。
      parameters:
      - description: 登录请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回用户信息
          schema:
            allOf:
            - $ref: '#/definitions/response.Any'
            - properties:
                data:
                  $ref: '#/definitions/oauth.BasicUserInfo'
              type: object
        "400":
          description: 用户名或密码错误、帐号已禁用等
          schema:
            $ref: '#/definitions/response.Any'
        "500":
          description: 服务内部错误
          schema:
            $ref: '#/definitions/response.Any'
      summary: 用户密码登录
      tags:
      - user
  /api/v1/user/logout:
    get:
      description: 清除用户登录 Session，完成退出
      produces:
      - application/json
      responses:
        "200":
          description: 退出成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Any'
            - properties:
                data:
                  type: string
              type: object
        "500":
          description: Session 清除失败
          schema:
            $ref: '#/definitions/response.Any'
      security:
      - SessionCookie: []
      summary: 用户退出登录
      tags:
      - user
  /api/v1/user/profile:
    put:
      consumes:
      - application/json
      description: 修改当前登录用户的昵称、邮箱、头像、简介、电话、性别、个人网站和所在地。
      parameters:
      - description: 更新请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.updateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 修改成功，返回更新后的用户信息
          schema:
            allOf:
            - $ref: '#/definitions/response.Any'
            - properties:
                data:
                  $ref: '#/definitions/oauth.BasicUserInfo'
              type: object
        "400":
          description: 邮箱已被占用或参数错误
          schema:
            $ref: '#/definitions/response.Any'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/response.Any'
      summary: 修改当前登录用户的个人资料
      tags:
      - user
  /api/v1/user/register:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码注册新账号，注册成功后自动登录并建立 Session。密码长度不能少于 8 位。
      parameters:
      - description: 注册请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.registerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册并登录成功，返回用户信息
          schema:
            allOf:
            - $ref: '#/definitions/response.Any'
            - properties:
                data:
                  $ref: '#/definitions/oauth.BasicUserInfo'
              type: object
        "400":
          description: 参数错误、用户名已存在或注册已关闭
          schema:
            $ref: '#/definitions/response.Any'
        "500":
          description: 服务内部错误
          schema:
            $ref: '#/definitions/response.Any'
      summary: 用户注册
      tags:
      - user
  /api/v1/user/self:
    get:
      description: 返回当前登录用户的基本信息及余额数据，需要登录。包括用户 ID、用户名、信任等级、各类余额信息等。
      produces:
      - application/json
      responses:
        "200":
          description: 用户信息
          schema:
            allOf:
            - $ref: '#/definitions/response.Any'
            - properties:
                data:
                  $ref: '#/definitions/oauth.BasicUserInfo'
              type: object
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/response.Any'
      security:
      - SessionCookie: []
      summary: 获取当前登录用户信息
      tags:
      - oauth
  /api/v1/user/send-email-code:
    post:
      consumes:
      - application/json
      description: 向指定邮箱发送验证码（用于注册场景）
      parameters:
      - description: 发送验证码请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.sendEmailCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 发送成功
          schema:
            $ref: '#/definitions/response.Any'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Any'
      summary: 发送邮箱验证码
      tags:
      - user
  /f/{id}:
    get:
      description: 根据文件 ID 获取并提供已上传的临时或正式文件，若配置了缓存则优先走本地缓存，否则从 S3 等后端存储读取并流式返回
      parameters:
      - description: 文件 ID
        in: path
        name: id
        required: true
        type: string
      - description: 图片质量 (low, medium, high, origin)，默认为 origin
        in: query
        name: quality
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 成功获取文件内容
          schema:
            type: file
        "400":
          description: 文件 ID 格式错误
          schema:
            $ref: '#/definitions/response.Any'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/response.Any'
        "404":
          description: 文件未找到
          schema:
            $ref: '#/definitions/response.Any'
        "500":
          description: 服务内部错误
          schema:
            $ref: '#/definitions/response.Any'
      summary: 获取已上传文件
      tags:
      - upload
  /robots.txt:
    get:
      description: 根据系统配置决定是否允许搜索引擎检索，并返回相应的 robots.txt 文件内容
      produces:
      - text/plain
      responses:
        "200":
          description: robots.txt 内容
          schema:
            type: string
      summary: 获取 robots.txt
      tags:
      - config
securityDefinitions:
  SessionCookie:
    in: cookie
    name: session
    type: apiKey
swagger: "2.0"
