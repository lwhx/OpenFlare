info:
  contact:
    name: OpenFlare
    url: https://github.com/Rain-kl/OpenFlare
  description: OpenFlare 平台后端 API，提供用户认证、系统配置、任务调度与边缘节点管理能力。
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: OpenFlare API
  version: 1.0.0
paths:
  /api/cap/challenge:
    post:
      consumes:
      - application/json
      description: 客户端获取 PoW 难题和签名的 JWT Token，并在后台计算。
      parameters:
      - description: 可选范围限制参数
        in: body
        name: request
        schema:
          $ref: '#/definitions/cap.challengeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回 PoW 难题
          schema:
            $ref: '#/definitions/cap.ChallengeResponse'
        "500":
          description: 内部服务错误
          schema:
            $ref: '#/definitions/github_com_Rain-kl_Wavelet_internal_apps_cap.RedeemResponse'
      summary: 生成人机验证难题
      tags:
      - cap
  /api/cap/redeem:
    post:
      consumes:
      - application/json
      description: 提交 PoW 解答进行核销，成功后返回一次性 X-Cap-Token 凭证
      parameters:
      - description: 难题 Token 与解答 solutions 数组
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cap.redeemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 核销成功，返回 X-Cap-Token
          schema:
            $ref: '#/definitions/github_com_Rain-kl_Wavelet_internal_apps_cap.RedeemResponse'
        "400":
          description: 参数错误或核销失败
          schema:
            $ref: '#/definitions/github_com_Rain-kl_Wavelet_internal_apps_cap.RedeemResponse'
        "500":
          description: 内部服务错误
          schema:
            $ref: '#/definitions/github_com_Rain-kl_Wavelet_internal_apps_cap.RedeemResponse'
      summary: 校验人机验证解答
      tags:
      - cap
  /api/health:
    get:
      description: 检查服务是否正常运行，可用于负载均衡存活探测
      produces:
      - application/json
      responses:
        "200":
          description: 服务正常
          schema:
            allOf:
            - $ref: '#/definitions/response.Any'
            - properties:
                data:
                  type: string
              type: object
      summary: 健康检查
      tags:
      - health
  /api/v1/admin/auth-sources:
    get:
      description: 返回所有已配置的 OAuth/OIDC 认证源列表，包括已启用和未启用的，需要管理员权限
      produces:
      - application/json
      responses:
        "200":
          description: 认证源列表
          schema:
            allOf:
            - $ref: '#/definitions/response.Any'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.AuthSource'
                  type: array
              type: object
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/response.Any'
        "403":
          description: 无管理员权限
          schema:
            $ref: '#/definitions/response.Any'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/response.Any'
      security:
      - SessionCookie: []
      summary: 获取认证源列表
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: 创建一个新的 OAuth/OIDC 认证源配置，认证源名称必须唯一且符合命名规范，需要管理员权限
      parameters:
      - description: 创建认证源参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth_source.AuthSourceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功，返回认证源信息
          schema:
            allOf:
            - $ref: '#/definitions/response.Any'
            - properties:
                data:
                  $ref: '#/definitions/model.AuthSource'
              type: object
        "400":
          description: 参数错误或验证失败
          schema:
            $ref: '#/definitions/response.Any'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/response.Any'
        "403":
          description: 无管理员权限
          schema:
            $ref: '#/definitions/response.Any'
      security:
      - SessionCookie: []
      summary: 创建认证源
      tags:
      - admin
  /api/v1/admin/auth-sources/{id}:
    delete:
      description: 删除指定认证源及其关联的所有外部帐号绑定记录，警告：删除后相关用户将无法通过该源登录，需要管理员权限
      parameters:
      - description: 认证源 ID 或名称
        format: int64
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Any'
            - properties:
                data:
                  type: string
              type: object
        "400":
          description: ID 无效或删除失败
          schema:
            $ref: '#/definitions/response.Any'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/response.Any'
        "403":
          description: 无管理员权限
          schema:
            $ref: '#/definitions/response.Any'
      security:
      - SessionCookie: []
