  /api/v1/oauth/{source}/authorize:
    get:
      description: 根据指定认证源名称发起 OAuth 授权，支持 purpose 参数用于区分登录和账号绑定场景。认证源必须已启用。
      parameters:
      - description: 认证源名称
        in: path
        name: source
        required: true
        type: string
      - description: 授权目的：login（登录）或 bind（绑定账号），默认 login
        in: query
        name: purpose
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 授权 URL
          schema:
            allOf:
            - $ref: '#/definitions/response.Any'
            - properties:
                data:
                  $ref: '#/definitions/oauth.OAuthAuthorizeResponse'
              type: object
        "400":
          description: 认证源不存在或未启用
          schema:
            $ref: '#/definitions/response.Any'
        "500":
          description: Redis 异常或构造 URL 失败
          schema:
            $ref: '#/definitions/response.Any'
      summary: 发起指定认证源授权
      tags:
      - oauth
  /api/v1/oauth/callback:
    post:
      consumes:
      - application/json
      description: 接收前端传回的 state 和 code，完成 OAuth/OIDC 认证并建立会话。支持登录（login）和账号绑定（bind）两种场景。
      parameters:
      - description: 回调请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/oauth.CallbackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录或绑定成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Any'
            - properties:
                data:
                  $ref: '#/definitions/oauth.OAuthCallbackResult'
              type: object
        "400":
          description: state 无效、参数错误或认证源错误
          schema:
            $ref: '#/definitions/response.Any'
        "401":
          description: 绑定场景未登录
          schema:
            $ref: '#/definitions/response.Any'
        "500":
          description: OAuth 认证失败或内部错误
          schema:
            $ref: '#/definitions/response.Any'
      summary: OAuth 回调处理
      tags:
      - oauth
