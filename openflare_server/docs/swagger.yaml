basePath: /
definitions:
  model.Option:
    properties:
      key:
        type: string
      value:
        type: string
    type: object
  service.AgentNodePayload:
    properties:
      agent_version:
        type: string
      current_version:
        type: string
      ip:
        type: string
      last_error:
        type: string
      name:
        type: string
      nginx_version:
        type: string
      node_id:
        type: string
      openresty_message:
        type: string
      openresty_status:
        type: string
    type: object
  service.ApplyLogPayload:
    properties:
      message:
        type: string
      node_id:
        type: string
      result:
        type: string
      version:
        type: string
    type: object
  service.ManagedDomainInput:
    properties:
      cert_id:
        type: integer
      domain:
        type: string
      enabled:
        type: boolean
      remark:
        type: string
    type: object
  service.NodeInput:
    properties:
      auto_update_enabled:
        type: boolean
      name:
        type: string
    type: object
  service.ProxyRouteCustomHeaderInput:
    properties:
      key:
        type: string
      value:
        type: string
    type: object
  service.ProxyRouteInput:
    properties:
      cert_id:
        type: integer
      custom_headers:
        items:
          $ref: '#/definitions/service.ProxyRouteCustomHeaderInput'
        type: array
      domain:
        type: string
      enable_https:
        type: boolean
      enabled:
        type: boolean
      origin_url:
        type: string
      redirect_http:
        type: boolean
      remark:
        type: string
    type: object
  service.TLSCertificateInput:
    properties:
      cert_pem:
        type: string
      key_pem:
        type: string
      name:
        type: string
      remark:
        type: string
    type: object
info:
  contact: {}
  description: OpenFlare Server 管理端与 Agent API 文档。
  title: OpenFlare Server API
  version: "3.0"
paths:
  /api/agent/apply-logs:
    post:
      consumes:
      - application/json
      parameters:
      - description: Apply log payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/service.ApplyLogPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - AgentTokenAuth: []
      summary: Report agent apply result
      tags:
      - Agent
  /api/agent/config-versions/active:
    get:
      produces:
      - application/json
      responses:
        "200":
