      - multipart/form-data
      parameters:
      - description: Certificate name
        in: formData
        name: name
        required: true
        type: string
      - description: Remark
        in: formData
        name: remark
        type: string
      - description: Certificate file
        in: formData
        name: cert_file
        required: true
        type: file
      - description: Private key file
        in: formData
        name: key_file
        required: true
        type: file
