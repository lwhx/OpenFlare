          schema:
            additionalProperties: true
            type: object
      summary: Upgrade server binary from latest GitHub release
      tags:
      - Update
schemes:
- http
- https
securityDefinitions:
  AgentTokenAuth:
    description: Agent API 使用节点专属 Agent Token 或全局 Discovery Token
    in: header
    name: X-Agent-Token
    type: apiKey
  BearerAuth:
    description: 管理端可使用 Bearer Token，例如：Bearer <token>
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
