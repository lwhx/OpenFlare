basePath: /
definitions:
  controller.CleanupConfigVersionRequest:
    properties:
      keep_count:
        minimum: 3
        type: integer
    required:
    - keep_count
    type: object
  controller.DnsAccountInput:
    properties:
      authorization:
        type: string
      name:
        type: string
      type:
        type: string
    type: object
  controller.geoIPLookupRequest:
    properties:
      ip:
        type: string
      provider:
        type: string
    type: object
  controller.optionBatchPayload:
    properties:
      options:
        items:
          $ref: '#/definitions/model.Option'
        type: array
    type: object
  model.Option:
    properties:
      key:
        type: string
      value:
        type: string
    type: object
  service.AgentBufferedObservabilityRecord:
    properties:
      access_logs:
        items:
          $ref: '#/definitions/service.AgentNodeAccessLog'
        type: array
      openresty_observation:
        $ref: '#/definitions/service.AgentNodeOpenrestyObservation'
      snapshot:
        $ref: '#/definitions/service.AgentNodeMetricSnapshot'
      traffic_report:
        $ref: '#/definitions/service.AgentNodeTrafficReport'
      window_started_at_unix:
        type: integer
    type: object
  service.AgentNodeAccessLog:
    properties:
      host:
        type: string
      logged_at_unix:
        type: integer
      path:
        type: string
      remote_addr:
        type: string
      status_code:
        type: integer
    type: object
  service.AgentNodeHealthEvent:
    properties:
      event_type:
        type: string
      message:
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      severity:
        type: string
      triggered_at_unix:
        type: integer
    type: object
  service.AgentNodeMetricSnapshot:
    properties:
      captured_at_unix:
        type: integer
      cpu_usage_percent:
        type: number
      disk_read_bytes:
        type: integer
      disk_write_bytes:
        type: integer
      memory_total_bytes:
        type: integer
      memory_used_bytes:
        type: integer
      network_rx_bytes:
        type: integer
      network_tx_bytes:
        type: integer
      storage_total_bytes:
        type: integer
      storage_used_bytes:
        type: integer
    type: object
  service.AgentNodeOpenrestyObservation:
    properties:
      captured_at_unix:
        type: integer
      openresty_connections:
        type: integer
      openresty_rx_bytes:
        type: integer
      openresty_tx_bytes:
        type: integer
    type: object
  service.AgentNodePayload:
    properties:
      access_logs:
        items:
          $ref: '#/definitions/service.AgentNodeAccessLog'
        type: array
      buffered_observability:
        items:
          $ref: '#/definitions/service.AgentBufferedObservabilityRecord'
        type: array
      current_version:
        type: string
      ext_version:
        type: string
      health_events:
        items:
          $ref: '#/definitions/service.AgentNodeHealthEvent'
        type: array
      ip:
        type: string
      last_error:
        type: string
      name:
        type: string
      node_id:
        type: string
      openresty_message:
        type: string
      openresty_observation:
        $ref: '#/definitions/service.AgentNodeOpenrestyObservation'
      openresty_status:
        type: string
      profile:
        $ref: '#/definitions/service.AgentNodeSystemProfile'
      snapshot:
        $ref: '#/definitions/service.AgentNodeMetricSnapshot'
      traffic_report:
        $ref: '#/definitions/service.AgentNodeTrafficReport'
      version:
        type: string
      waf_ip_group_checksums:
        additionalProperties:
          type: string
        type: object
    type: object
  service.AgentNodeSystemProfile:
    properties:
      architecture:
        type: string
      cpu_cores:
        type: integer
      cpu_model:
        type: string
      hostname:
        type: string
      kernel_version:
        type: string
      os_name:
        type: string
      os_version:
        type: string
      reported_at_unix:
        type: integer
      total_disk_bytes:
        type: integer
      total_memory_bytes:
        type: integer
      uptime_seconds:
        type: integer
    type: object
  service.AgentNodeTrafficReport:
    properties:
      error_count:
        type: integer
      request_count:
        type: integer
      source_countries:
        additionalProperties:
          type: integer
        type: object
      status_codes:
        additionalProperties:
          type: integer
        type: object
      top_domains:
        additionalProperties:
          type: integer
        type: object
      unique_visitor_count:
        type: integer
      window_ended_at_unix:
        type: integer
      window_started_at_unix:
        type: integer
    type: object
  service.AgentWAFIPGroupSyncInput:
    properties:
      checksums:
        additionalProperties:
          type: string
        type: object
      ids:
        items:
          type: integer
        type: array
    type: object
  service.ApplyLogPayload:
    properties:
      checksum:
        type: string
      main_config_checksum:
        type: string
      message:
        type: string
      node_id:
        type: string
      result:
        type: string
      route_config_checksum:
        type: string
      support_file_count:
        type: integer
      version:
        type: string
    type: object
  service.FlaredConnectedRelay:
    properties:
      proxy_count:
        type: integer
      relay_node_id:
        type: string
      status:
        type: string
    type: object
  service.FlaredHeartbeatPayload:
    properties:
      client_version:
        type: string
      connected_relays:
        items:
          $ref: '#/definitions/service.FlaredConnectedRelay'
        type: array
      current_checksum:
        type: string
      current_version:
        type: string
      frp_version:
        type: string
      ip:
        type: string
      tunnel_status:
        type: string
    type: object
  service.ManagedDomainInput:
    properties:
      cert_id:
        type: integer
      domain:
        type: string
      enabled:
        type: boolean
      remark:
        type: string
    type: object
  service.NodeInput:
    properties:
      auto_update_enabled:
        type: boolean
      geo_latitude:
        type: number
      geo_longitude:
        type: number
      geo_manual_override:
        type: boolean
      geo_name:
        type: string
      ip:
        type: string
      ip_manual_override:
        type: boolean
      name:
        type: string
      node_type:
        description: TunnelRelay fields
        type: string
      relay_agent_access_addr:
        type: string
      relay_bind_port:
        type: integer
      relay_client_access_addr:
        type: string
      relay_client_proxy_url:
        type: string
      relay_vhost_http_port:
        type: integer
      relay_web_server_enabled:
        type: boolean
    type: object
  service.ProxyRouteCustomHeaderInput:
    properties:
      key:
        type: string
      value:
        type: string
    type: object
  service.ProxyRouteInput:
    properties:
      basic_auth_enabled:
        type: boolean
      basic_auth_password:
        type: string
      basic_auth_username:
        type: string
      cache_enabled:
        type: boolean
      cache_policy:
        type: string
      cache_rules:
        items:
          type: string
        type: array
      cert_id:
        type: integer
      cert_ids:
        items:
          type: integer
        type: array
      custom_headers:
        items:
          $ref: '#/definitions/service.ProxyRouteCustomHeaderInput'
        type: array
      domain:
        type: string
      domain_cert_ids:
        items:
          type: integer
        type: array
      domains:
        items:
          type: string
        type: array
      enable_https:
        type: boolean
      enabled:
        type: boolean
      limit_conn_per_ip:
        type: integer
      limit_conn_per_server:
        type: integer
      limit_rate:
        type: string
      origin_address:
        type: string
      origin_host:
        type: string
      origin_id:
        type: integer
      origin_port:
        type: string
      origin_scheme:
        type: string
      origin_uri:
        type: string
      origin_url:
        type: string
      pow_config:
        type: string
      pow_enabled:
        type: boolean
      redirect_http:
        type: boolean
      remark:
        type: string
      site_name:
        type: string
      tunnel_id:
        type: integer
      tunnel_node_id:
        type: integer
      tunnel_target_addr:
        type: string
      tunnel_target_protocol:
        type: string
      upstream_type:
        type: string
      upstreams:
        items:
          type: string
        type: array
    type: object
  service.RelayHeartbeatPayload:
    properties:
      frp_version:
        type: string
      frps_client_count:
        type: integer
      frps_connections:
        type: integer
      frps_proxies:
        items:
          $ref: '#/definitions/service.RelayProxyStat'
        type: array
      frps_proxy_count:
        type: integer
      health_events:
        items:
          $ref: '#/definitions/service.AgentNodeHealthEvent'
        type: array
      ip:
        type: string
      name:
        type: string
      profile:
        $ref: '#/definitions/service.AgentNodeSystemProfile'
      relay_status:
        type: string
      snapshot:
        $ref: '#/definitions/service.AgentNodeMetricSnapshot'
      version:
        type: string
    type: object
  service.RelayProxyStat:
    properties:
      client_addr:
        type: string
      client_version:
        type: string
      last_close_time:
        type: string
      last_start_time:
        type: string
      name:
        type: string
      status:
        type: string
      type:
        type: string
    type: object
  service.TLSApplyInput:
    properties:
      acme_account_id:
        type: integer
      auto_renew:
        type: boolean
      disable_cname:
        type: boolean
      dns_account_id:
        type: integer
      dns1:
        type: string
      dns2:
        type: string
      key_algorithm:
        type: string
      name:
        type: string
      other_domains:
        type: string
      primary_domain:
        type: string
      remark:
        type: string
      skip_dns:
        type: boolean
    type: object
  service.TLSCertificateInput:
    properties:
      cert_pem:
        type: string
      key_pem:
        type: string
      name:
        type: string
      remark:
        type: string
    type: object
