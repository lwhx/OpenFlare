name: Release
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag to publish, for example v1.0.0-beta"
        required: false
        type: string
  push:
    tags: ["v*"]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.version.outputs.should_run }}
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version metadata
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          SHOULD_RUN=true
          POINTED_TAG="$(git tag --points-at HEAD --list 'v*' | sort -V | tail -n1)"
          INPUT_VERSION="${INPUT_VERSION//[[:space:]]/}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ -n "$POINTED_TAG" ]]; then
            VERSION="$POINTED_TAG"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "workflow_dispatch requires an explicit version input when HEAD is not tagged" >&2
            exit 1
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            echo "main branch release requires the current commit to be tagged" >&2
            exit 1
          else
            echo "unable to resolve release version from the current ref" >&2
            exit 1
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

  build-frontend:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: openflare-server/frontend/pnpm-lock.yaml

      - name: Build Frontend
        working-directory: openflare-server/frontend
        env:
          CI: ""
          NEXT_PUBLIC_APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build:embed

      - name: Prepare embed directory
        run: |
          rm -rf openflare-server/internal/router/root/dist
          cp -R openflare-server/frontend/out openflare-server/internal/router/root/dist

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: openflare-server/internal/router/root/dist
          retention-days: 1

  build-binaries:
    needs:
      - prepare
      - build-frontend
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: openflare-server-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: openflare-server-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: openflare-server-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: openflare-server-darwin-arm64
          - goos: windows
            goarch: amd64
            asset_name: openflare-server-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: openflare-server/internal/router/root/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: openflare-server/go.mod
          cache-dependency-path: openflare-server/go.sum

      - name: Build Server
        working-directory: openflare-server
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          go mod download
          mkdir -p ../dist
          go build -trimpath -tags embed_frontend \
            -ldflags "-s -w -X 'github.com/Rain-kl/Wavelet/internal/buildinfo.Version=$VERSION'" \
            -o "../dist/$ASSET_NAME" ./main.go

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 1

  build-agent-binaries:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: openflare-agent-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: openflare-agent-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: openflare-agent-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: openflare-agent-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Agent
        working-directory: openflare-agent
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          go mod download
          mkdir -p ../dist
          go build -trimpath -ldflags "-s -w -X 'github.com/rain-kl/openflare/openflare-agent/internal/config.Version=$VERSION'" -o "../dist/$ASSET_NAME" ./cmd/agent
          (cd ../dist && sha256sum "$ASSET_NAME" > "$ASSET_NAME.sha256")

      - name: Upload Agent Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          retention-days: 1

  build-relay-binaries:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: openflare-relay-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: openflare-relay-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: openflare-relay-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: openflare-relay-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Relay
        working-directory: openflare-relay
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          go mod download
          mkdir -p ../dist
          go build -trimpath -ldflags "-s -w -X 'github.com/rain-kl/openflare/openflare-relay/internal/config.Version=$VERSION'" -o "../dist/$ASSET_NAME" ./cmd/relay
          (cd ../dist && sha256sum "$ASSET_NAME" > "$ASSET_NAME.sha256")

      - name: Upload Relay Artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          retention-days: 1

  build-flared-binaries:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: openflared-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: openflared-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: openflared-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: openflared-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Flared
        working-directory: openflared
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          go mod download
          mkdir -p ../dist
          go build -trimpath -ldflags "-s -w -X 'github.com/rain-kl/openflare/openflared/internal/config.Version=$VERSION'" -o "../dist/$ASSET_NAME" ./cmd/flared
          (cd ../dist && sha256sum "$ASSET_NAME" > "$ASSET_NAME.sha256")

      - name: Upload Flared Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flared-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          retention-days: 1

  release:
    needs:
      - prepare
      - build-binaries
      - build-agent-binaries
      - build-relay-binaries
      - build-flared-binaries
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Server Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "server-*"
          path: dist
          merge-multiple: true

      - name: Download Agent Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "agent-*"
          path: dist
          merge-multiple: true

      - name: Download Relay Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "relay-*"
          path: dist
          merge-multiple: true

      - name: Download Flared Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "flared-*"
          path: dist
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: dist/*
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          body: |
            查看完整更新日志: https://open-flare.pages.dev/changelog/
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
