name: Cleanup prerelease tags

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version metadata
        id: version
        run: |
          SHOULD_RUN=true
          VERSION="all-prerelease-tags"

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete prerelease releases and tags
        if: steps.version.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          if [[ "$CONFIRM" != "cleanup-prerelease-tags" ]]; then
            echo "confirm input must be exactly cleanup-prerelease-tags" >&2
            exit 1
          fi

          mapfile -t TAGS < <(git tag --list 'v*' | sort -V)
          DELETED=0

          for TAG in "${TAGS[@]}"; do
            if [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
              echo "Keep formal release tag: $TAG"
              continue
            fi

            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Delete prerelease release: $TAG"
              gh release delete "$TAG" --yes
            else
              echo "No GitHub Release found for $TAG"
            fi

            echo "Delete prerelease tag: $TAG"
            git push origin --delete "refs/tags/$TAG"
            DELETED=$((DELETED + 1))
          done

          echo "Deleted $DELETED prerelease tag(s)."
